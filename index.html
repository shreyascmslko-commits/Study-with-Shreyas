<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EduSpark Pro - Smart Learning</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: rgba(0,0,0,0.3);
}

button {
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: #00c9a7;
    color: white;
}

/* Login */
.container {
    text-align: center;
    margin-top: 60px;
}

input, select {
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
}

/* Dashboard */
.dashboard {
    display: none;
    padding: 20px;
}

/* Cards */
.card {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    margin: 10px;
    border-radius: 12px;
    transition: 0.4s;
}
.card:hover {
    transform: translateY(-8px) scale(1.05);
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
}

/* Progress */
.progress-bar {
    background: white;
    border-radius: 10px;
    overflow: hidden;
}
.progress {
    height: 20px;
    background: limegreen;
    width: 0%;
}

/* Dark mode */
.dark {
    background: black;
    color: white;
}
</style>
</head>

<body>

<div class="navbar">
    <h2>📘 EduSpark Pro</h2>
    <div>
        <button onclick="toggleDark()">🌙</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<!-- LOGIN -->
<div class="container" id="loginBox">
    <h1>Student Login</h1>
    <input type="text" id="username" placeholder="Enter Name"><br>

    <select id="board">
        <option>CBSE</option>
        <option>ICSE</option>
    </select><br>

    <select id="class">
        <option>Class 6</option>
        <option>Class 7</option>
        <option>Class 8</option>
        <option>Class 9</option>
        <option>Class 10</option>
    </select><br>

    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
    <h2 id="welcome"></h2>

    <h3>📊 Progress</h3>
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <h3>📚 Subjects</h3>
    <div class="grid">

        <div class="card">
            <h3>📐 Maths</h3>
            <button onclick="openResource('math')">Open</button>
        </div>

        <div class="card">
            <h3>🔬 Science</h3>
            <button onclick="openResource('science')">Open</button>
        </div>

        <div class="card">
            <h3>📖 English</h3>
            <button onclick="openResource('english')">Open</button>
        </div>

        <div class="card">
            <h3>🌍 SST</h3>
            <button onclick="openResource('sst')">Open</button>
        </div>

    </div>

    <div id="resources"></div>
</div>

<script>

/* LOGIN */
function login() {
    let user = document.getElementById("username").value;
    let board = document.getElementById("board").value;
    let cls = document.getElementById("class").value;

    if (user === "") {
        alert("Enter name!");
        return;
    }

    localStorage.setItem("user", user);
    localStorage.setItem("board", board);
    localStorage.setItem("class", cls);
    localStorage.setItem("progress", 10);

    loadDashboard();
}

function logout() {
    localStorage.clear();
    location.reload();
}

/* LOAD */
function loadDashboard() {
    let user = localStorage.getItem("user");

    if (user) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("dashboard").style.display = "block";

        document.getElementById("welcome").innerHTML =
            `Welcome ${user} | ${localStorage.getItem("board")} | ${localStorage.getItem("class")}`;

        updateProgress();
    }
}

/* PROGRESS */
function updateProgress() {
    let progress = localStorage.getItem("progress") || 0;
    document.getElementById("progress").style.width = progress + "%";
}

/* RESOURCES */
function openResource(subject) {

    let board = localStorage.getItem("board");
    let cls = localStorage.getItem("class");

    let content = `<h2>${subject.toUpperCase()} Resources</h2>`;

    if (subject === "math") {
        content += `
        <ul>
            <li><a href="https://ncert.nic.in/textbook/pdf/iemh1dd.pdf" target="_blank">NCERT Maths PDF</a></li>
            <li><a href="https://www.topperlearning.com" target="_blank">Practice Questions</a></li>
            <li><a href="https://byjus.com/maths/algebra-formulas/" target="_blank">Algebra Formulas</a></li>
        </ul>`;
    }

    if (subject === "science") {
        content += `
        <ul>
            <li><a href="https://ncert.nic.in/textbook.php" target="_blank">NCERT Science Books</a></li>
            <li><a href="https://byjus.com/science/" target="_blank">Concept Videos</a></li>
            <li><a href="https://www.learncbse.in" target="_blank">Sample Papers</a></li>
        </ul>`;
    }

    if (subject === "english") {
        content += `
        <ul>
            <li><a href="https://www.learncbse.in/english-grammar/" target="_blank">Grammar Rules</a></li>
            <li><a href="https://byjus.com/english/" target="_blank">Writing Skills</a></li>
            <li><a href="https://ncert.nic.in" target="_blank">NCERT English</a></li>
        </ul>`;
    }

    if (subject === "sst") {
        content += `
        <ul>
            <li><a href="https://ncert.nic.in/textbook.php" target="_blank">NCERT SST</a></li>
            <li><a href="https://www.learncbse.in" target="_blank">History Notes</a></li>
            <li><a href="https://byjus.com/free-ias-prep/" target="_blank">Geography Maps</a></li>
        </ul>`;
    }

    document.getElementById("resources").innerHTML = content;

    /* increase progress */
    let progress = parseInt(localStorage.getItem("progress")) || 0;
    progress += 10;
    if (progress > 100) progress = 100;
    localStorage.setItem("progress", progress);
    updateProgress();
}

/* DARK MODE */
function toggleDark() {
    document.body.classList.toggle("dark");
}

/* AUTO LOAD */
window.onload = loadDashboard;

</script>

</body>
</html>
